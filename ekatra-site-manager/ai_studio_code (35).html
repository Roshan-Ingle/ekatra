<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekatra | Site Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #82CFFF;
            --primary-glow: rgba(130, 207, 255, 0.4);
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --glass-bg: rgba(20, 25, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --success: #4ADE80;
            --error: #F87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- LIQUID BACKGROUND ORBS --- */
        .blob {
            position: fixed;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.6;
            animation: float 12s infinite alternate ease-in-out;
        }
        .blob-1 {
            top: 10%; left: 15%; width: 350px; height: 350px;
            background: linear-gradient(135deg, #1f4037 0%, #99f2c8 100%);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }
        .blob-2 {
            bottom: 10%; right: 15%; width: 400px; height: 400px;
            background: linear-gradient(135deg, #2E3192 0%, #1BFFFF 100%);
            border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%;
            animation-delay: -5s;
        }
        .blob-3 {
            top: 40%; left: 50%; width: 250px; height: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            transform: translateX(-50%);
            animation-duration: 15s;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1) rotate(0deg); }
            100% { transform: translateY(40px) scale(1.1) rotate(20deg); }
        }

        /* --- GLASS CONTAINER --- */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 36px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 0 1px var(--glass-highlight);
            z-index: 10;
        }

        h2 { 
            text-align: center; 
            margin-top: 0;
            margin-bottom: 35px; 
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        h2 span { 
            background: linear-gradient(to right, #82CFFF, #1BFFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        /* --- STEP-BY-STEP UI --- */
        .step-container {
            position: relative;
            border-left: 2px solid rgba(255,255,255,0.1);
            padding-left: 28px;
            margin-left: 14px;
            padding-bottom: 28px;
            transition: opacity 0.4s ease;
        }
        .step-container:last-child {
            border-left: 2px solid transparent;
            padding-bottom: 0;
        }
        .step-container.disabled {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .step-number {
            position: absolute;
            left: -17px;
            top: -2px;
            width: 32px;
            height: 32px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            color: var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .step-container.active .step-number {
            border-color: var(--primary);
            background: var(--primary-glow);
            color: #FFF;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .step-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* --- INPUTS & BUTTONS (GLASS) --- */
        label { 
            display: block; 
            font-size: 12px; 
            margin-bottom: 8px; 
            color: var(--text-muted); 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }
        
        /* Select dropdown items styling for readability */
        select option { background: #111827; color: #fff; }

        input:focus, select:focus, textarea:focus { 
            border-color: var(--primary); 
            outline: none; 
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn {
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn:hover { 
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #82CFFF, #3B82F6);
            color: #000;
            border: none;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:hover {
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
            background: linear-gradient(135deg, #93D8FF, #4F8DF6);
        }
        .btn:active { transform: scale(0.98); }

        /* --- FILE UPLOADER (GLASS) --- */
        .file-drop-area {
            border: 1px dashed rgba(255,255,255,0.3);
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
            padding: 24px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-drop-area:hover { 
            border-color: var(--primary); 
            background: rgba(130, 207, 255, 0.05); 
            box-shadow: inset 0 0 20px rgba(130, 207, 255, 0.1);
        }
        #fileInput { display: none; }

        .hidden { display: none !important; }

        /* --- STATUS BOX --- */
        #status-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
            font-weight: 500;
            word-wrap: break-word;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .link-item {
            display: inline-block;
            margin-top: 10px;
            margin-right: 6px;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .link-item:hover { 
            background: #FFF; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<!-- Liquid Orbs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="container">
    <h2>Ekatra <span>Site Manager</span></h2>
    
    <!-- STEP 1: AUTHENTICATION -->
    <div class="step-container active" id="step1">
        <div class="step-number">1</div>
        <div class="step-title">Connect to GitHub</div>
        <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        <button class="btn" id="btn-connect" onclick="connectGitHub()">Verify & Connect</button>
    </div>

    <!-- STEP 2: DESTINATION -->
    <div class="step-container disabled" id="step2">
        <div class="step-number">2</div>
        <div class="step-title">Choose Destination</div>
        
        <label>Select Repository</label>
        <select id="repo-select" onchange="handleRepoSelection()"></select>
        <input type="text" id="new-repo-input" class="hidden" placeholder="Enter new repo name (e.g., my-new-project)">

        <label>Target Folder</label>
        <select id="folder-select" onchange="handleFolderSelection()"></select>
        <input type="text" id="new-folder-input" class="hidden" placeholder="Enter new folder name (e.g., my-new-tool)">
    </div>

    <!-- STEP 3: CONTENT -->
    <div class="step-container disabled" id="step3">
        <div class="step-number">3</div>
        <div class="step-title">Add Project Code</div>
        
        <label>File Name</label>
        <input type="text" id="filename" value="index.html" placeholder="e.g., index.html, styles.css">

        <div class="file-drop-area" onclick="document.getElementById('fileInput').click()">
            <span id="fileNameDisplay">📁 Click to select file</span>
            <input type="file" id="fileInput" onchange="handleFileSelect(this)">
        </div>

        <label style="text-align:center; margin: 12px 0; font-size: 10px; letter-spacing: 1px;">— OR PASTE MANUALLY —</label>
        <textarea id="code" rows="5" placeholder="<!DOCTYPE html>&#10;<html>...</html>"></textarea>
    </div>

    <!-- STEP 4: DEPLOY -->
    <div class="step-container disabled" id="step4">
        <div class="step-number">4</div>
        <div class="step-title">Publish</div>
        <button class="btn btn-primary" onclick="deployProject()">🚀 Deploy to Cloud</button>
        <div id="status-box"></div>
    </div>

</div>

<script>
let uploadedFileContent = "";
let githubUsername = "";

// --- UI HELPERS ---
function showStatus(message, type) {
    const box = document.getElementById('status-box');
    box.style.display = 'block';
    box.innerHTML = message;
    if(type === 'error') {
        box.style.background = 'rgba(248, 113, 113, 0.15)';
        box.style.color = 'var(--error)';
        box.style.border = '1px solid rgba(248, 113, 113, 0.3)';
    } else if (type === 'success') {
        box.style.background = 'rgba(74, 222, 128, 0.15)';
        box.style.color = 'var(--success)';
        box.style.border = '1px solid rgba(74, 222, 128, 0.3)';
    } else {
        box.style.background = 'rgba(130, 207, 255, 0.15)';
        box.style.color = 'var(--primary)';
        box.style.border = '1px solid rgba(130, 207, 255, 0.3)';
    }
}

function enableStep(stepId) {
    const step = document.getElementById(stepId);
    step.classList.remove('disabled');
    step.classList.add('active');
}

// --- STEP 1: CONNECT TO GITHUB ---
async function connectGitHub() {
    const pat = document.getElementById('pat').value.trim();
    const btn = document.getElementById('btn-connect');
    
    if (!pat) { alert("Please enter your Personal Access Token."); return; }

    btn.innerText = "Connecting...";
    btn.disabled = true;

    try {
        const userRes = await fetch("https://api.github.com/user", { headers: { 'Authorization': `token ${pat}` } });
        if (!userRes.ok) throw new Error("Invalid PAT");
        const userData = await userRes.json();
        githubUsername = userData.login;

        const response = await fetch("https://api.github.com/user/repos?per_page=100&sort=updated", {
            headers: { 'Authorization': `token ${pat}` }
        });

        if (response.ok) {
            const repos = await response.json();
            const repoSelect = document.getElementById('repo-select');
            
            repoSelect.innerHTML = '<option value="" disabled selected>-- Select a Repository --</option>';
            repoSelect.innerHTML += '<option value="CREATE_NEW_REPO">➕ Create New Repository</option>';
            repoSelect.innerHTML += '<option disabled>──────────────</option>';

            repos.forEach(repo => {
                const option = document.createElement('option');
                option.value = repo.full_name;
                option.text = repo.full_name;
                repoSelect.appendChild(option);
            });

            btn.innerText = `✅ Connected as ${githubUsername}`;
            btn.style.background = "rgba(74, 222, 128, 0.2)";
            btn.style.borderColor = "var(--success)";
            btn.style.color = "var(--success)";
            
            enableStep('step2'); 
        } else {
            throw new Error("Failed to load repos");
        }
    } catch (e) {
        btn.innerText = "Verify & Connect";
        btn.disabled = false;
        alert("Failed to connect. Please check your PAT.");
    }
}

// --- STEP 2: REPO SELECTION ROUTER ---
function handleRepoSelection() {
    const repoSelect = document.getElementById('repo-select').value;
    const newRepoInput = document.getElementById('new-repo-input');
    const folderSelect = document.getElementById('folder-select');

    if (repoSelect === "CREATE_NEW_REPO") {
        newRepoInput.classList.remove('hidden');
        newRepoInput.focus();
        
        folderSelect.innerHTML = '<option value="ROOT" selected>🌐 Root Directory (Main Branch)</option>';
        folderSelect.innerHTML += '<option value="CREATE_NEW">➕ Create New Folder</option>';
        document.getElementById('new-folder-input').classList.add('hidden'); 
        
        enableStep('step3'); 
        enableStep('step4');
    } else {
        newRepoInput.classList.add('hidden');
        loadFolders(); 
    }
}

// --- STEP 2.5: LOAD FOLDERS ---
async function loadFolders() {
    const pat = document.getElementById('pat').value;
    const repo = document.getElementById('repo-select').value;
    const folderSelect = document.getElementById('folder-select');
    
    folderSelect.innerHTML = '<option value="">⏳ Loading folders...</option>';

    try {
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/`, {
            headers: { 'Authorization': `token ${pat}` }
        });

        folderSelect.innerHTML = '<option value="" disabled selected>-- Select Target Folder --</option>';
        folderSelect.innerHTML += '<option value="ROOT">🌐 Root Directory (Main Branch)</option>';
        folderSelect.innerHTML += '<option value="CREATE_NEW">➕ Create New Folder</option>';
        folderSelect.innerHTML += '<option disabled>──────────────</option>';

        if (response.ok) {
            const contents = await response.json();
            const folders = contents.filter(item => item.type === 'dir');
            folders.forEach(dir => {
                const option = document.createElement('option');
                option.value = dir.name;
                option.text = `📁 ${dir.name}`;
                folderSelect.appendChild(option);
            });
        }
        
        enableStep('step3'); 
        enableStep('step4'); 
    } catch (e) {
        folderSelect.innerHTML = '<option value="ROOT">🌐 Root Directory (Main Branch)</option>';
        folderSelect.innerHTML += '<option value="CREATE_NEW">➕ Create New Folder</option>';
    }
}

function handleFolderSelection() {
    const select = document.getElementById('folder-select');
    const input = document.getElementById('new-folder-input');
    
    if (select.value === "CREATE_NEW") {
        input.classList.remove('hidden');
        input.focus();
    } else {
        input.classList.add('hidden');
    }
}

// --- STEP 3: FILE HANDLING ---
function handleFileSelect(input) {
    const file = input.files[0];
    if (file) {
        document.getElementById('fileNameDisplay').innerHTML = `<span style="color:var(--success)">✅ ${file.name} Loaded</span>`;
        document.getElementById('filename').value = file.name;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedFileContent = e.target.result;
            document.getElementById('code').value = uploadedFileContent; 
        };
        reader.readAsText(file);
    }
}

// --- STEP 4: DEPLOY ---
async function deployProject() {
    const pat = document.getElementById('pat').value;
    let targetRepo = document.getElementById('repo-select').value;
    const folderSelect = document.getElementById('folder-select').value;
    const newFolderInput = document.getElementById('new-folder-input').value.trim();
    let filenameInput = document.getElementById('filename').value.trim() || "index.html";
    const textContent = document.getElementById('code').value;

    const finalContent = textContent || uploadedFileContent;
    let folder = folderSelect === "CREATE_NEW" ? newFolderInput : folderSelect;

    if(!pat || !targetRepo || !folder || !finalContent || !filenameInput) {
        showStatus("⚠️ Missing information. Please complete all steps.", "error");
        return;
    }

    showStatus("🔍 Preparing deployment...", "loading");

    let isNewRepo = false;
    let plainRepoName = "";
    if (targetRepo === "CREATE_NEW_REPO") {
        plainRepoName = document.getElementById('new-repo-input').value.trim().replace(/\s+/g, '-');
        if (!plainRepoName) { showStatus("⚠️ Please enter a repository name.", "error"); return; }
        
        showStatus("📦 Creating new repository...", "loading");
        try {
            const createRes = await fetch('https://api.github.com/user/repos', {
                method: 'POST',
                headers: { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: plainRepoName, auto_init: true }) 
            });

            if (!createRes.ok) {
                const err = await createRes.json();
                showStatus(`❌ Failed to create repo: ${err.message}`, "error");
                return;
            }

            const newRepoData = await createRes.json();
            targetRepo = newRepoData.full_name; 
            isNewRepo = true;

            showStatus("⏳ Repository created! Initializing branch...", "loading");
            await new Promise(r => setTimeout(r, 2000));
        } catch(e) {
            showStatus("❌ Network error while creating repository.", "error");
            return;
        }
    }

    let path = "";
    if (folder === "ROOT") {
        path = filenameInput;
    } else {
        folder = folder.toLowerCase().replace(/\s+/g, '-');
        path = `${folder}/${filenameInput}`;
    }

    const url = `https://api.github.com/repos/${targetRepo}/contents/${path}`;
    const encodedContent = btoa(unescape(encodeURIComponent(finalContent)));

    try {
        let fileSha = null;
        let isUpdate = false;

        if (!isNewRepo) {
            const getResponse = await fetch(url, {
                method: 'GET',
                headers: { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github.v3+json' }
            });

            if (getResponse.ok) {
                const fileData = await getResponse.json();
                fileSha = fileData.sha;
                isUpdate = true;
                showStatus("🔄 Existing file found. Updating...", "loading");
            } else if (getResponse.status !== 404) {
                showStatus("❌ Error connecting to repository.", "error");
                return;
            }
        }

        const payload = {
            message: isUpdate ? `Site Manager: Updated ${path}` : `Site Manager: Created ${path}`,
            content: encodedContent
        };
        if (fileSha) payload.sha = fileSha;

        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if(response.ok) {
            const successMsg = isUpdate ? "Updated Successfully!" : "Deployment Successful!";
            
            let liveUrl = "";
            if (isNewRepo) {
                liveUrl = `https://${githubUsername}.github.io/${plainRepoName}/${folder==="ROOT" ? "" : folder+"/"}${filenameInput==="index.html" ? "" : filenameInput}`;
            } else {
                if (folder === "ROOT") liveUrl = filenameInput === "index.html" ? `https://ekatra.sbs/` : `https://ekatra.sbs/${filenameInput}`;
                else liveUrl = filenameInput === "index.html" ? `https://ekatra.sbs/${folder}/` : `https://ekatra.sbs/${folder}/${filenameInput}`;
            }

            const ghRepoUrl = `https://github.com/${targetRepo}`;

            showStatus(`
                🎉 <b>${successMsg}</b><br><br>
                <a href="${liveUrl}" target="_blank" class="link-item">🌍 View Live Site</a>
                <a href="${ghRepoUrl}" target="_blank" class="link-item">📁 View Code</a>
            `, "success");

        } else {
            const err = await response.json();
            showStatus(`❌ Deployment Failed: ${err.message}`, "error");
        }
    } catch (e) {
        showStatus("❌ Network Error during upload!", "error");
    }
}
</script>

</body>
</html>
