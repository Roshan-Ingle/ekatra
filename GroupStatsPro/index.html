<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Analyzer - Ultra Pro</title>
    
    <!-- Bold Google Fonts for Neubrutalism Vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Lexend+Mega:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
    
    <!-- jsPDF & AutoTable for Professional PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* Neubrutalism Variables */
        :root {
            --bg-color: #E2F0CB;         
            --card-bg: #FFFFFF;          
            --primary: #FF5E5B;          
            --secondary: #00CECB;        
            --accent: #FFED66;           
            --dark: #1D1D1D;
            
            --border-width: 3px;
            --border-color: #000000;
            --shadow-color: #000000;
            --shadow-offset: 4px;
            --border-radius: 8px;
            
            --font-main: 'Space Grotesk', sans-serif;
            --font-head: 'Lexend Mega', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--border-color);
            line-height: 1.5;
            overflow-x: hidden;
            padding-bottom: 100px; 
        }

        /* App Bar */
        .top-app-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: var(--accent);
            border-bottom: var(--border-width) solid var(--border-color);
            box-shadow: 0px var(--shadow-offset) 0px var(--shadow-color);
        }

        .top-app-bar h1 {
            font-family: var(--font-head);
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            padding: 24px;
            text-align: center;
        }

        .empty-state .material-symbols-outlined {
            font-size: 80px;
            margin-bottom: 16px;
            color: var(--card-bg);
            -webkit-text-stroke: 2px var(--border-color);
        }

        .empty-state h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background-color: var(--primary);
            color: white;
            padding: 4px 12px;
            border: var(--border-width) solid var(--border-color);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            border-radius: var(--border-radius);
            transform: rotate(-2deg);
        }

        .empty-state p {
            font-size: 16px;
            font-weight: 500;
            margin-top: 12px;
        }

        /* Filter Section */
        .filter-section {
            display: none;
            padding: 16px;
            background-color: var(--secondary);
            border-bottom: var(--border-width) solid var(--border-color);
            box-shadow: 0px var(--shadow-offset) 0px var(--shadow-color);
            margin-bottom: 16px;
        }

        .date-inputs {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .date-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .date-box label {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        input[type="date"] {
            font-family: var(--font-main);
            font-size: 14px;
            font-weight: 700;
            padding: 10px;
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            background: var(--card-bg);
            outline: none;
            width: 100%;
        }

        .btn-apply {
            width: 100%;
            padding: 12px;
            font-family: var(--font-head);
            font-size: 14px;
            background-color: var(--primary);
            color: white;
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-apply:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* Chips / Tabs */
        .chip-container {
            display: none;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 12px;
            padding: 16px;
            scroll-snap-type: x mandatory;
        }

        .chip-container::-webkit-scrollbar {
            display: none;
        }

        .chip {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            background-color: var(--card-bg);
            color: var(--border-color);
            font-family: var(--font-main);
            font-size: 15px;
            font-weight: 700;
            border: var(--border-width) solid var(--border-color);
            box-shadow: 3px 3px 0px var(--shadow-color);
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            scroll-snap-align: start;
        }

        .chip.active {
            background-color: var(--accent);
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--shadow-color);
        }

        /* Content Area & Cards */
        #content-area {
            display: none;
            padding: 0 16px 16px 16px;
        }

        .meta-info {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 8px 12px;
            background-color: var(--dark);
            color: white;
            border: var(--border-width) solid var(--border-color);
            box-shadow: 3px 3px 0px var(--shadow-color);
            border-radius: var(--border-radius);
            display: inline-block;
        }

        .section-title {
            font-size: 18px;
            font-family: var(--font-head);
            font-weight: 600;
            color: var(--border-color);
            margin: 24px 0 12px 0;
            text-transform: uppercase;
        }

        .card {
            background-color: var(--card-bg);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            margin-bottom: 16px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            overflow: hidden;
            animation: snapUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: var(--border-width) solid var(--border-color);
            background-color: var(--card-bg);
            cursor: pointer;
            transition: background-color 0.1s;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:active {
            background-color: var(--accent);
        }

        .sender-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 0; 
            background-color: var(--accent);
            border: 2px solid var(--border-color);
            box-shadow: 2px 2px 0px var(--shadow-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: var(--border-color);
        }

        .name-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name {
            font-size: 16px;
            font-weight: 700;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sub-stats {
            font-size: 11px;
            font-weight: 700;
            color: #555;
            margin-top: 2px;
        }

        .count-badge {
            background-color: var(--primary);
            color: white;
            padding: 6px 14px;
            border: 2px solid var(--border-color);
            box-shadow: 2px 2px 0px var(--shadow-color);
            border-radius: 0; 
            font-size: 14px;
            font-weight: 700;
        }

        /* Insights Grid Layout */
        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .insight-card {
            background-color: var(--card-bg);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 16px;
            box-shadow: 3px 3px 0px var(--shadow-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: snapUp 0.3s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .insight-card.full-width {
            grid-column: 1 / -1;
            background-color: var(--accent);
        }

        .insight-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .insight-value {
            font-family: var(--font-head);
            font-size: 22px;
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .insight-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #444;
        }

        .long-msg-preview {
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px dashed var(--border-color);
            font-style: italic;
            color: var(--dark);
        }

        /* Message Viewer Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color);
            z-index: 300;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
        }

        .modal.open {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: var(--secondary);
            border-bottom: var(--border-width) solid var(--border-color);
            box-shadow: 0px var(--shadow-offset) 0px var(--shadow-color);
            z-index: 10;
        }

        .back-btn {
            font-size: 28px;
            margin-right: 12px;
            cursor: pointer;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 2px 2px 0px var(--shadow-color);
            padding: 4px;
        }

        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--shadow-color);
        }

        .modal-title-box {
            display: flex;
            flex-direction: column;
        }

        .modal-title {
            font-family: var(--font-head);
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;
        }

        .modal-subtitle {
            font-size: 12px;
            font-weight: 700;
            opacity: 0.8;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble {
            background-color: var(--card-bg);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 12px;
            box-shadow: 3px 3px 0px var(--shadow-color);
            font-size: 14px;
            font-weight: 500;
            word-wrap: break-word;
            white-space: pre-wrap; 
        }

        .msg-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            border-top: 2px dashed var(--border-color);
            padding-top: 6px;
        }

        .load-more-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 24px;
            font-family: var(--font-head);
            font-size: 14px;
            background-color: var(--accent);
            color: var(--border-color);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .load-more-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 64px;
            height: 64px;
            border-radius: var(--border-radius);
            background-color: var(--secondary);
            border: var(--border-width) solid var(--border-color);
            box-shadow: 4px 4px 0px var(--shadow-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            z-index: 100;
        }

        .fab:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--shadow-color);
        }

        .fab .material-symbols-outlined {
            color: var(--border-color);
            font-size: 32px;
        }

        .fab input[type="file"] {
            display: none;
        }

        /* Loader */
        .loader-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(226, 240, 203, 0.95);
            z-index: 400;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            background-color: var(--primary);
            border: var(--border-width) solid var(--border-color);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            animation: spinBounce 1s infinite ease-in-out;
        }

        @keyframes snapUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spinBounce {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(0.6) rotate(180deg); border-radius: 50%; background-color: var(--secondary);}
            100% { transform: scale(1) rotate(360deg); }
        }

    </style>
</head>
<body>

    <header class="top-app-bar">
        <h1>Group Stats Pro</h1>
    </header>

    <main id="empty-state" class="empty-state">
        <span class="material-symbols-outlined">query_stats</span>
        <h2>Drop Chat Here</h2>
        <p>Tap the button below to upload your exported WhatsApp .txt file.</p>
    </main>

    <div id="filter-section" class="filter-section">
        <div class="date-inputs">
            <div class="date-box">
                <label for="start-date">START DATE</label>
                <input type="date" id="start-date">
            </div>
            <div class="date-box">
                <label for="end-date">END DATE</label>
                <input type="date" id="end-date">
            </div>
        </div>
        <button class="btn-apply" onclick="applyDateFilter()">APPLY FILTER</button>
    </div>

    <!-- Filter Tabs (Insights Default) -->
    <div id="chip-container" class="chip-container">
        <button class="chip active" data-type="insights" onclick="switchTab('insights', this)">Insights 🚀</button>
        <button class="chip" data-type="total" onclick="switchTab('total', this)">Overall</button>
        <button class="chip" data-type="monthly" onclick="switchTab('monthly', this)">Monthly</button>
        <button class="chip" data-type="weekly" onclick="switchTab('weekly', this)">Weekly</button>
        <button class="chip" data-type="daily" onclick="switchTab('daily', this)">Daily</button>
    </div>

    <!-- Results Area -->
    <div id="content-area"></div>

    <!-- Message Viewer Modal -->
    <div id="message-modal" class="modal">
        <div class="modal-header">
            <span class="material-symbols-outlined back-btn" onclick="closeModal()">arrow_back</span>
            <div class="modal-title-box">
                <div class="modal-title" id="modal-user-name">User Name</div>
                <div class="modal-subtitle" id="modal-context">Total: 0 Messages</div>
            </div>
        </div>
        <div class="modal-body" id="modal-body">
            <!-- Message Bubbles Injected Here -->
        </div>
    </div>

    <!-- FAB -->
    <label class="fab">
        <span class="material-symbols-outlined">upload_file</span>
        <input type="file" id="file-input" accept=".txt">
    </label>

    <!-- Loading Overlay -->
    <div id="loader" class="loader-overlay">
        <div class="loader"></div>
        <p id="loader-text" style="margin-top: 24px; font-family: var(--font-head); font-weight: 600;">CRUNCHING DATA...</p>
    </div>

    <script>
        // Core State Management
        let allMessages =[];       
        let filteredMessages =[];  
        let currentActiveTab = 'insights'; 
        
        let aggregatedData = { total: {}, daily: {}, weekly: {}, monthly: {} };
        
        // Advanced Insights State
        let deepStats = {
            totalWords: 0,
            totalMedia: 0,
            totalLinks: 0,
            hourly: new Array(24).fill(0),
            dow: new Array(7).fill(0),
            longestMsg: { words: 0, sender: "", body: "" },
            userProfiles: {} 
        };

        const dowNames =["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        let currentModalMessages =[];
        let messagesRendered = 0;
        const RENDER_CHUNK_SIZE = 100;

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            showLoader(true, "READING FILE...");
            const reader = new FileReader();
            reader.onload = function(evt) {
                setTimeout(() => { 
                    document.getElementById('loader-text').innerText = "PARSING MESSAGES...";
                    setTimeout(() => {
                        try {
                            parseWhatsAppText(evt.target.result);
                        } catch (error) {
                            alert("Error parsing file. Ensure it's a WhatsApp text export.");
                            console.error(error);
                            showLoader(false);
                        }
                    }, 50);
                }, 50);
            };
            reader.readAsText(file);
        });

        // 1. Fully Rewritten & Bulletproof Parsing Engine
        function parseWhatsAppText(text) {
            allMessages =[];
            const lines = text.split('\n');
            
            // Highly robust Regex to capture Date, Time, and EVERYTHING after as Content
            const lineStartRegex = /^\[?(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})[, ]\s*(\d{1,2}:\d{2}(?::\d{2})?\s*(?:[aApP]\.?[mM]\.?)?)\]?\s*[-\u2013]?\s*(.*)$/;

            let minTimestamp = Infinity;
            let maxTimestamp = -Infinity;
            let lastMessageRef = null;

            lines.forEach(line => {
                const cleanLine = line.replace(/[\u200E\u200F\u202A-\u202E]/g, '');
                const match = cleanLine.match(lineStartRegex);
                
                if (match) {
                    // It's a brand new timestamped event line
                    const dateStr = match[1].trim();
                    const timeStr = match[2].trim();
                    const content = match[3].trim();

                    // Isolate standard WhatsApp 'Sender: Message' formatting
                    let colonIndex = content.indexOf(': ');
                    if (colonIndex === -1) {
                        colonIndex = content.indexOf(':'); // Fallback check
                    }

                    // RULE 1: If there is no colon, it's 100% an auto-generated system message (e.g. "John left")
                    if (colonIndex === -1) {
                        lastMessageRef = null; // Break multi-line chain
                        return; 
                    }

                    const sender = content.substring(0, colonIndex).trim();
                    const msgBody = content.substring(colonIndex + 1).trim();

                    // RULE 2: Filter out System Messages that happen to contain colons, AND ignore deleted messages
                    const lowerSender = sender.toLowerCase();
                    const lowerBody = msgBody.toLowerCase();
                    
                    const isSystemSender = sender.length > 35 || lowerSender.includes(" changed ") || lowerSender.includes(" pinned ");
                    const isDeletedMsg = lowerBody === "this message was deleted" || lowerBody === "this message was deleted." || lowerBody === "you deleted this message" || lowerBody === "you deleted this message.";

                    if (isSystemSender || isDeletedMsg) {
                        lastMessageRef = null; // Break multi-line chain
                        return; 
                    }

                    // --- PASSED ALL CHECKS! PARSE DATE ---
                    const parts = dateStr.split(/[\/\-\.]/);
                    let d = parseInt(parts[0], 10), m = parseInt(parts[1], 10), y = parseInt(parts[2], 10);
                    if (m > 12) { let t = d; d = m; m = t; }
                    if (y < 100) { y += 2000; } 

                    const dateObj = new Date(y, m - 1, d);
                    
                    if (!isNaN(dateObj.getTime())) {
                        const ts = dateObj.getTime();
                        
                        lastMessageRef = {
                            dateObj: dateObj,
                            timestamp: ts,
                            sender: sender,
                            msgBody: msgBody,
                            timeStr: timeStr,
                            dateStr: dateObj.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
                        };
                        
                        allMessages.push(lastMessageRef);
                        if (ts < minTimestamp) minTimestamp = ts;
                        if (ts > maxTimestamp) maxTimestamp = ts;
                    }
                } else if (lastMessageRef && cleanLine.trim() !== '') {
                    // It's a valid continuation of the previous user's multi-line message
                    lastMessageRef.msgBody += '\n' + cleanLine;
                }
            });

            if (allMessages.length > 0) {
                document.getElementById('start-date').valueAsDate = new Date(minTimestamp);
                document.getElementById('end-date').valueAsDate = new Date(maxTimestamp);
            }

            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('filter-section').style.display = 'block';
            document.getElementById('chip-container').style.display = 'flex';
            document.getElementById('content-area').style.display = 'block';

            applyDateFilter(); 
        }

        // 2. Date Filtering
        function applyDateFilter() {
            showLoader(true, "RUNNING DEEP ANALYSIS...");
            
            setTimeout(() => {
                const startInput = document.getElementById('start-date').valueAsDate;
                const endInput = document.getElementById('end-date').valueAsDate;

                if (startInput && endInput) {
                    startInput.setHours(0, 0, 0, 0);
                    endInput.setHours(23, 59, 59, 999);
                    filteredMessages = allMessages.filter(m => m.timestamp >= startInput.getTime() && m.timestamp <= endInput.getTime());
                } else {
                    filteredMessages = allMessages; 
                }

                aggregateDataEngine();
                renderView(currentActiveTab);
                showLoader(false);
            }, 50);
        }

        // 3. Ultra Advanced Aggregation Engine
        function aggregateDataEngine() {
            aggregatedData = { total: {}, daily: {}, weekly: {}, monthly: {} };
            
            deepStats = {
                totalWords: 0, totalMedia: 0, totalLinks: 0,
                hourly: new Array(24).fill(0), dow: new Array(7).fill(0),
                longestMsg: { words: 0, sender: "", body: "" },
                userProfiles: {}
            };

            const monthNames =["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const linkRegex = /https?:\/\/[^\s]+/g;
            const mediaRegex = /<Media omitted>|image omitted|video omitted|sticker omitted|audio omitted/i;

            filteredMessages.forEach(msg => {
                const d = msg.dateObj;
                const s = msg.sender;
                const body = msg.msgBody;

                const dailyKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                const monthlyKey = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
                const firstDay = new Date(d);
                const diff = firstDay.getDate() - firstDay.getDay() + (firstDay.getDay() === 0 ? -6 : 1);
                firstDay.setDate(diff);
                const weeklyKey = `Week of ${String(firstDay.getDate()).padStart(2, '0')} ${monthNames[firstDay.getMonth()]} ${firstDay.getFullYear()}`;

                msg.dailyKey = dailyKey;
                msg.weeklyKey = weeklyKey;
                msg.monthlyKey = monthlyKey;

                aggregatedData.total[s] = (aggregatedData.total[s] || 0) + 1;
                if (!aggregatedData.daily[dailyKey]) aggregatedData.daily[dailyKey] = {};
                aggregatedData.daily[dailyKey][s] = (aggregatedData.daily[dailyKey][s] || 0) + 1;
                if (!aggregatedData.weekly[weeklyKey]) aggregatedData.weekly[weeklyKey] = {};
                aggregatedData.weekly[weeklyKey][s] = (aggregatedData.weekly[weeklyKey][s] || 0) + 1;
                if (!aggregatedData.monthly[monthlyKey]) aggregatedData.monthly[monthlyKey] = {};
                aggregatedData.monthly[monthlyKey][s] = (aggregatedData.monthly[monthlyKey][s] || 0) + 1;

                const wordsCount = body.split(/\s+/).filter(w => w.trim().length > 0).length;
                const isMedia = mediaRegex.test(body) ? 1 : 0;
                const linksCount = (body.match(linkRegex) ||[]).length;
                const hour = d.getHours();
                const dayOfWeek = d.getDay();

                if (!deepStats.userProfiles[s]) {
                    deepStats.userProfiles[s] = { words: 0, media: 0, links: 0 };
                }

                deepStats.userProfiles[s].words += wordsCount;
                deepStats.userProfiles[s].media += isMedia;
                deepStats.userProfiles[s].links += linksCount;

                deepStats.totalWords += wordsCount;
                deepStats.totalMedia += isMedia;
                deepStats.totalLinks += linksCount;
                deepStats.hourly[hour]++;
                deepStats.dow[dayOfWeek]++;

                if (wordsCount > deepStats.longestMsg.words && !isMedia) {
                    deepStats.longestMsg = { words: wordsCount, sender: s, body: body };
                }
            });
        }

        // 4. Handle Tab Switching
        function switchTab(type, chipElement) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            chipElement.classList.add('active');
            currentActiveTab = type;
            renderView(type);
        }

        // 5. Render Logic
        function renderView(type) {
            const container = document.getElementById('content-area');
            container.innerHTML = ''; 

            const totalCount = filteredMessages.length;
            
            if (totalCount === 0) {
                container.innerHTML = `<div class="meta-info">0 Messages</div><div class="section-title">No data found</div>`;
                return;
            }

            if (type === 'insights') {
                renderInsights(container, totalCount);
                return;
            }

            container.innerHTML = `<div class="meta-info">Total Messages: ${totalCount.toLocaleString()}</div>`;

            if (type === 'total') {
                container.innerHTML += `<div class="section-title">All Time Leaderboard</div>`;
                const sortedSenders = getSortedArray(aggregatedData.total);
                container.appendChild(createBrutalistCardList(sortedSenders, 'total', type));
            } else {
                const dataSet = aggregatedData[type];
                const sortedPeriods = Object.keys(dataSet).sort((a, b) => new Date(b) - new Date(a));

                let delayCounter = 0;
                sortedPeriods.forEach(period => {
                    const sectionTitle = document.createElement('div');
                    sectionTitle.className = 'section-title';
                    let displayPeriod = period;
                    if(type === 'daily') {
                        const dateP = new Date(period);
                        displayPeriod = dateP.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
                    }
                    sectionTitle.innerText = displayPeriod;
                    container.appendChild(sectionTitle);

                    const sortedSenders = getSortedArray(dataSet[period]);
                    const cardList = createBrutalistCardList(sortedSenders, period, type);
                    cardList.style.animationDelay = `${delayCounter * 0.05}s`;
                    delayCounter++;
                    container.appendChild(cardList);
                });
            }
        }

        function renderInsights(container, totalCount) {
            const maxHourIndex = deepStats.hourly.indexOf(Math.max(...deepStats.hourly));
            const ampm = maxHourIndex >= 12 ? 'PM' : 'AM';
            const displayHour = maxHourIndex % 12 || 12;
            const peakTime = `${displayHour}:00 ${ampm}`;

            const maxDowIndex = deepStats.dow.indexOf(Math.max(...deepStats.dow));
            const peakDay = dowNames[maxDowIndex];

            let html = `<div class="meta-info">Deep Analytics Engine V2</div>
                        <div class="insights-grid" style="animationDelay: 0s">`;

            const buildCard = (icon, val, label, extraClass="", extraHtml="") => `
                <div class="insight-card ${extraClass}">
                    <div class="insight-icon">${icon}</div>
                    <div class="insight-value">${val}</div>
                    <div class="insight-label">${label}</div>
                    ${extraHtml}
                </div>
            `;

            html += buildCard("💬", totalCount.toLocaleString(), "Total Messages");
            html += buildCard("📝", formatNumber(deepStats.totalWords), "Words Typed");
            html += buildCard("📸", deepStats.totalMedia.toLocaleString(), "Media Shared");
            html += buildCard("🔗", deepStats.totalLinks.toLocaleString(), "Links Sent");
            html += buildCard("🔥", peakTime, "Peak Activity Hour");
            html += buildCard("📅", peakDay, "Busiest Day");

            if (deepStats.longestMsg.words > 0) {
                let preview = deepStats.longestMsg.body;
                if(preview.length > 100) preview = preview.substring(0, 100) + "...";
                
                const yapperHtml = `<div class="long-msg-preview">"${escapeHTML(preview)}" <br><b>- ${deepStats.longestMsg.sender}</b></div>`;
                html += buildCard("🏆", `${deepStats.longestMsg.words} Words`, "The Yapper Award (Longest Message)", "full-width", yapperHtml);
            }

            html += `</div>`;

            html += `
                <button class="btn-apply" style="margin-top: 16px; background-color: var(--dark); border-color: var(--primary);" onclick="generatePDF()">
                    <span class="material-symbols-outlined">picture_as_pdf</span>
                    DOWNLOAD FULL PDF REPORT
                </button>
            `;

            container.innerHTML = html;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }

        function getSortedArray(obj) {
            return Object.keys(obj).map(sender => ({ name: sender, count: obj[sender] })).sort((a, b) => b.count - a.count);
        }

        function createBrutalistCardList(sortedArray, periodKey, tabType) {
            const card = document.createElement('div');
            card.className = 'card';

            sortedArray.forEach(item => {
                const initial = item.name.charAt(0).toUpperCase();
                const profile = deepStats.userProfiles[item.name] || { words: 0, media: 0, links: 0 };
                
                let subStatsHtml = '';
                if (tabType === 'total') {
                    subStatsHtml = `<div class="sub-stats">📝 ${formatNumber(profile.words)} words • 📸 ${profile.media} media</div>`;
                }

                const listItem = document.createElement('div');
                listItem.className = 'list-item';
                listItem.onclick = () => openMessageModal(item.name, periodKey, tabType);
                
                listItem.innerHTML = `
                    <div class="sender-info">
                        <div class="avatar">${initial}</div>
                        <div class="name-box">
                            <div class="name">${item.name}</div>
                            ${subStatsHtml}
                        </div>
                    </div>
                    <div class="count-badge">${item.count}</div>
                `;
                card.appendChild(listItem);
            });

            return card;
        }

        // --- Modal Logic ---
        function openMessageModal(sender, periodKey, tabType) {
            currentModalMessages = filteredMessages.filter(m => m.sender === sender);
            
            let contextText = "Overall Range";
            if (tabType !== 'total') {
                currentModalMessages = currentModalMessages.filter(m => m[`${tabType}Key`] === periodKey);
                if(tabType === 'daily') {
                    contextText = new Date(periodKey).toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
                } else {
                    contextText = periodKey;
                }
            }

            document.getElementById('modal-user-name').innerText = sender;
            document.getElementById('modal-context').innerText = `${contextText} • ${currentModalMessages.length} Messages`;

            messagesRendered = 0;
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = ''; 

            renderNextMessageChunk();
            document.getElementById('message-modal').classList.add('open');
        }

        function renderNextMessageChunk() {
            const modalBody = document.getElementById('modal-body');
            const existingBtn = document.getElementById('load-more-btn');
            if (existingBtn) existingBtn.remove();

            const limit = Math.min(messagesRendered + RENDER_CHUNK_SIZE, currentModalMessages.length);
            let htmlChunk = "";
            
            for (let i = messagesRendered; i < limit; i++) {
                const msg = currentModalMessages[i];
                htmlChunk += `
                    <div class="msg-bubble">
                        <div>${escapeHTML(msg.msgBody)}</div>
                        <div class="msg-meta">
                            <span>${msg.dateStr}</span>
                            <span>${msg.timeStr}</span>
                        </div>
                    </div>
                `;
            }
            
            modalBody.insertAdjacentHTML('beforeend', htmlChunk);
            messagesRendered = limit;

            if (messagesRendered < currentModalMessages.length) {
                const btn = document.createElement('button');
                btn.id = 'load-more-btn';
                btn.className = 'load-more-btn';
                btn.innerText = `LOAD MORE (${currentModalMessages.length - messagesRendered} left)`;
                btn.onclick = renderNextMessageChunk;
                modalBody.appendChild(btn);
            }
        }

        function closeModal() {
            document.getElementById('message-modal').classList.remove('open');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        function showLoader(show, text = "CRUNCHING DATA...") {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        // --- PDF Generator ---
        function generatePDF() {
            if (filteredMessages.length === 0) {
                alert("No data available to generate report.");
                return;
            }

            showLoader(true, "GENERATING PDF...");

            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();

                    const primaryRGB =[255, 94, 91]; 
                    const secondaryRGB = [0, 206, 203]; 
                    const darkRGB = [29, 29, 29];

                    const cleanText = (text) => text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2300}-\u{23FF}]/gu, '');

                    doc.setFontSize(24);
                    doc.setTextColor(primaryRGB[0], primaryRGB[1], primaryRGB[2]);
                    doc.setFont("helvetica", "bold");
                    doc.text("WhatsApp Group Stats Pro", 14, 22);

                    doc.setFontSize(10);
                    doc.setTextColor(100);
                    doc.setFont("helvetica", "normal");
                    
                    const startDateInput = document.getElementById('start-date').valueAsDate;
                    const endDateInput = document.getElementById('end-date').valueAsDate;
                    let dateRangeStr = "All Time";
                    if (startDateInput && endDateInput) {
                        dateRangeStr = `${startDateInput.toLocaleDateString()} to ${endDateInput.toLocaleDateString()}`;
                    }

                    doc.text(`Generated on: ${new Date().toLocaleString('en-IN')}`, 14, 30);
                    doc.text(`Date Range: ${dateRangeStr}`, 14, 35);

                    doc.setFontSize(14);
                    doc.setTextColor(darkRGB[0], darkRGB[1], darkRGB[2]);
                    doc.setFont("helvetica", "bold");
                    doc.text("1. High-Level Group Insights", 14, 48);

                    const maxHourIndex = deepStats.hourly.indexOf(Math.max(...deepStats.hourly));
                    const peakTime = `${maxHourIndex % 12 || 12}:00 ${maxHourIndex >= 12 ? 'PM' : 'AM'}`;
                    const maxDowIndex = deepStats.dow.indexOf(Math.max(...deepStats.dow));
                    const peakDay = dowNames[maxDowIndex];

                    doc.autoTable({
                        startY: 53,
                        head: [['Metric', 'Value']],
                        body: [['Total Messages', filteredMessages.length.toLocaleString()],['Total Words Typed', deepStats.totalWords.toLocaleString()],
                            ['Total Media Shared', deepStats.totalMedia.toLocaleString()],['Total Links Sent', deepStats.totalLinks.toLocaleString()],
                            ['Busiest Day', peakDay],['Peak Activity Hour', peakTime]
                        ],
                        theme: 'grid',
                        headStyles: { fillColor: secondaryRGB, fontStyle: 'bold' },
                        styles: { fontSize: 11, cellPadding: 5 }
                    });

                    let finalY = doc.lastAutoTable.finalY || 100;
                    
                    if (deepStats.longestMsg.words > 0) {
                        doc.setFontSize(14);
                        doc.setTextColor(darkRGB[0], darkRGB[1], darkRGB[2]);
                        doc.text("2. The Yapper Award (Longest Message)", 14, finalY + 15);
                        
                        doc.setFontSize(10);
                        doc.setFont("helvetica", "italic");
                        
                        let yapperBody = cleanText(deepStats.longestMsg.body);
                        if (yapperBody.length > 500) yapperBody = yapperBody.substring(0, 500) + "...";
                        
                        const yapperText = `"${yapperBody}"\n\n- Sent by ${cleanText(deepStats.longestMsg.sender)} (${deepStats.longestMsg.words} words)`;
                        const splitText = doc.splitTextToSize(yapperText, 180);
                        
                        const boxHeight = (splitText.length * 5) + 10;
                        doc.setFillColor(245, 245, 245);
                        doc.rect(14, finalY + 20, 182, boxHeight, 'F');
                        
                        doc.setTextColor(60);
                        doc.text(splitText, 18, finalY + 27);
                        
                        finalY = finalY + 20 + boxHeight;
                    }

                    doc.setFontSize(14);
                    doc.setTextColor(darkRGB[0], darkRGB[1], darkRGB[2]);
                    doc.setFont("helvetica", "bold");
                    doc.text("3. Complete Member Leaderboard", 14, finalY + 15);

                    const sortedSenders = getSortedArray(aggregatedData.total);
                    const tableBody = sortedSenders.map((item, index) => {
                        const profile = deepStats.userProfiles[item.name];
                        return[
                            index + 1, 
                            cleanText(item.name), 
                            item.count.toLocaleString(), 
                            profile.words.toLocaleString(), 
                            profile.media.toLocaleString(), 
                            profile.links.toLocaleString()
                        ];
                    });

                    doc.autoTable({
                        startY: finalY + 20,
                        head: [['Rank', 'Member Name', 'Messages', 'Words', 'Media', 'Links']],
                        body: tableBody,
                        theme: 'striped',
                        headStyles: { fillColor: primaryRGB, fontStyle: 'bold' },
                        styles: { fontSize: 10, cellPadding: 4 },
                        columnStyles: {
                            0: { cellWidth: 15 },
                            1: { cellWidth: 'auto' },
                            2: { halign: 'center' },
                            3: { halign: 'center' },
                            4: { halign: 'center' },
                            5: { halign: 'center' }
                        }
                    });

                    doc.save("WhatsApp_Analysis_Report.pdf");
                    showLoader(false);

                } catch (error) {
                    console.error("PDF Generation Error: ", error);
                    alert("An error occurred while generating the PDF. Your device might be out of memory for a file this size.");
                    showLoader(false);
                }
            }, 300);
        }
    </script>
</body>
</html>
